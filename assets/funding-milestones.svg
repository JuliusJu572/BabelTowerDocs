<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="620" viewBox="0 0 1320 620">
  <rect width="1320" height="620" fill="#f8fafc"/>
  <text x="660" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#0f172a">融资用途要绑定去风险里程碑</text>
  <defs><marker id="a" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M0,0 L14,7 L0,14 z" fill="#64748b"/></marker></defs>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="175" width="210" height="150" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="175" y="220" text-anchor="middle" font-size="20" font-weight="700" fill="#1e40af">Demo 资金</text>
    <text x="175" y="253" text-anchor="middle" font-size="14" fill="#1e3a8a">验证第一集是否上头</text>
    <text x="175" y="280" text-anchor="middle" font-size="14" fill="#1e3a8a">完播 / 开口 / 复刷</text>
    <rect x="335" y="175" width="210" height="150" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="440" y="220" text-anchor="middle" font-size="20" font-weight="700" fill="#5b21b6">MVP 资金</text>
    <text x="440" y="253" text-anchor="middle" font-size="14" fill="#4c1d95">做 3 部短剧和运行时</text>
    <text x="440" y="280" text-anchor="middle" font-size="14" fill="#4c1d95">证明内容可重复生产</text>
    <rect x="600" y="175" width="210" height="150" rx="18" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
    <text x="705" y="220" text-anchor="middle" font-size="20" font-weight="700" fill="#9a3412">增长资金</text>
    <text x="705" y="253" text-anchor="middle" font-size="14" fill="#7c2d12">小规模获客与付费测试</text>
    <text x="705" y="280" text-anchor="middle" font-size="14" fill="#7c2d12">证明 CAC/LTV 假设</text>
    <rect x="865" y="175" width="210" height="150" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="970" y="220" text-anchor="middle" font-size="20" font-weight="700" fill="#166534">B 端试点</text>
    <text x="970" y="253" text-anchor="middle" font-size="14" fill="#14532d">高校/企业训练场景</text>
    <text x="970" y="280" text-anchor="middle" font-size="14" fill="#14532d">证明采购和复用</text>
    <rect x="1130" y="175" width="130" height="150" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <text x="1195" y="220" text-anchor="middle" font-size="20" font-weight="700" fill="#991b1b">Seed</text>
    <text x="1195" y="253" text-anchor="middle" font-size="14" fill="#7f1d1d">放大已验证</text>
    <text x="1195" y="280" text-anchor="middle" font-size="14" fill="#7f1d1d">的飞轮</text>
    <line x1="280" y1="250" x2="325" y2="250" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <line x1="545" y1="250" x2="590" y2="250" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <line x1="810" y1="250" x2="855" y2="250" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <line x1="1075" y1="250" x2="1120" y2="250" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <text x="660" y="455" text-anchor="middle" font-size="17" fill="#475569">好的融资叙事不是“我们需要钱做很多功能”，而是“每一笔钱用来回答一个关键不确定性”。</text>
  </g>
</svg>
