<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620">
  <rect width="1280" height="620" fill="#0f172a"/>
  <text x="640" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">BabelTower MVP 架构与内容流</text>
  <text x="640" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#cbd5e1">生产层生成内容，运行时包定义合约，后端执行状态机，前端呈现互动短剧体验</text>
  <defs>
    <marker id="arrow3" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="160" width="240" height="150" rx="18" fill="#1d4ed8"/>
    <text x="190" y="202" text-anchor="middle" font-size="22" font-weight="700" fill="white">Drama Studio</text>
    <text x="190" y="232" text-anchor="middle" font-size="14" fill="#dbeafe">algorithm/production</text>
    <text x="190" y="258" text-anchor="middle" font-size="14" fill="#dbeafe">剧本 / 角色 / 分镜 / 视频</text>
    <text x="190" y="284" text-anchor="middle" font-size="14" fill="#dbeafe">12-stage pipeline</text>

    <rect x="385" y="160" width="220" height="150" rx="18" fill="#7c3aed"/>
    <text x="495" y="202" text-anchor="middle" font-size="22" font-weight="700" fill="white">Runtime Package</text>
    <text x="495" y="232" text-anchor="middle" font-size="14" fill="#ede9fe">schema 1.1.0</text>
    <text x="495" y="258" text-anchor="middle" font-size="14" fill="#ede9fe">nodes / interactions / edges</text>
    <text x="495" y="284" text-anchor="middle" font-size="14" fill="#ede9fe">endings / achievements</text>

    <rect x="680" y="160" width="220" height="150" rx="18" fill="#0f766e"/>
    <text x="790" y="202" text-anchor="middle" font-size="22" font-weight="700" fill="white">Backend Runtime</text>
    <text x="790" y="232" text-anchor="middle" font-size="14" fill="#ccfbf1">FastAPI services</text>
    <text x="790" y="258" text-anchor="middle" font-size="14" fill="#ccfbf1">状态机 / 语音评分</text>
    <text x="790" y="284" text-anchor="middle" font-size="14" fill="#ccfbf1">成就 / 预加载 / 埋点</text>

    <rect x="975" y="160" width="220" height="150" rx="18" fill="#f97316"/>
    <text x="1085" y="202" text-anchor="middle" font-size="22" font-weight="700" fill="white">Mobile Client</text>
    <text x="1085" y="232" text-anchor="middle" font-size="14" fill="#ffedd5">Flutter</text>
    <text x="1085" y="258" text-anchor="middle" font-size="14" fill="#ffedd5">播放器 / 字幕 / 选择</text>
    <text x="1085" y="284" text-anchor="middle" font-size="14" fill="#ffedd5">语音 / 成就 / 跟读</text>

    <line x1="310" y1="235" x2="375" y2="235" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow3)"/>
    <line x1="605" y1="235" x2="670" y2="235" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow3)"/>
    <line x1="900" y1="235" x2="965" y2="235" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow3)"/>

    <rect x="150" y="405" width="980" height="90" rx="18" fill="#1e293b" stroke="#334155"/>
    <text x="640" y="440" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc">MVP 成本控制原则</text>
    <text x="640" y="472" text-anchor="middle" font-size="15" fill="#cbd5e1">视频离线预生成；实时 AI 只用于关键语音判断、角色追问和结局复盘；图像/视频模型采用多供应商备选。</text>
