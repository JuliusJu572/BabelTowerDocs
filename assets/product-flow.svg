<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <rect width="1280" height="560" fill="#f8fafc"/>
  <text x="640" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">BabelTower 用户体验闭环</text>
  <text x="640" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">看一段剧情，做一次表达/选择，进入不同后果，最后获得成就与能力复盘</text>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#475569"/>
    </marker>
  </defs>

  <g font-family="Arial, sans-serif">
    <rect x="60" y="180" width="150" height="100" rx="16" fill="#1d4ed8"/>
    <text x="135" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="white">首页/详情</text>
    <text x="135" y="248" text-anchor="middle" font-size="13" fill="#dbeafe">选剧、字幕、成就</text>

    <rect x="265" y="180" width="150" height="100" rx="16" fill="#7c3aed"/>
    <text x="340" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="white">视频节点</text>
    <text x="340" y="248" text-anchor="middle" font-size="13" fill="#ede9fe">20-60 秒剧情片段</text>

    <rect x="470" y="145" width="170" height="70" rx="16" fill="#0ea5e9"/>
    <text x="555" y="176" text-anchor="middle" font-size="18" font-weight="700" fill="white">剧情选择</text>
    <text x="555" y="200" text-anchor="middle" font-size="13" fill="#e0f2fe">选项改变变量</text>

    <rect x="470" y="250" width="170" height="70" rx="16" fill="#14b8a6"/>
    <text x="555" y="281" text-anchor="middle" font-size="18" font-weight="700" fill="white">语音回应</text>
    <text x="555" y="305" text-anchor="middle" font-size="13" fill="#ccfbf1">ASR + LLM 评估</text>

    <rect x="705" y="180" width="160" height="100" rx="16" fill="#f97316"/>
    <text x="785" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="white">状态机</text>
    <text x="785" y="248" text-anchor="middle" font-size="13" fill="#ffedd5">trust / clue / risk</text>

    <rect x="920" y="180" width="150" height="100" rx="16" fill="#ef4444"/>
    <text x="995" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="white">结局/成就</text>
    <text x="995" y="248" text-anchor="middle" font-size="13" fill="#fee2e2">普通 + 隐藏结局</text>

    <rect x="1120" y="180" width="120" height="100" rx="16" fill="#16a34a"/>
    <text x="1180" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="white">跟读复盘</text>
    <text x="1180" y="248" text-anchor="middle" font-size="13" fill="#dcfce7">表达优化</text>

    <line x1="210" y1="230" x2="255" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="415" y1="230" x2="460" y2="180" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="415" y1="230" x2="460" y2="285" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="640" y1="180" x2="695" y2="220" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="640" y1="285" x2="695" y2="240" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="865" y1="230" x2="910" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="1070" y1="230" x2="1110" y2="230" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>

    <path d="M 995 290 C 940 430, 410 430, 340 300" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="9 8" marker-end="url(#arrow)"/>
    <text x="650" y="430" text-anchor="middle" font-size="15" fill="#475569">复刷：尝试不同路线、隐藏线索、不同表达策略和成就收集</text>
  </g>
</svg>
