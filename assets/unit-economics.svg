<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="680" viewBox="0 0 1280 680">
  <rect width="1280" height="680" fill="#f8fafc"/>
  <text x="640" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#0f172a">单位经济：互动短剧能否跑通的关键假设</text>
  <defs><marker id="a" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M0,0 L14,7 L0,14 z" fill="#64748b"/></marker></defs>
  <g font-family="Arial, sans-serif">
    <rect x="80" y="145" width="255" height="120" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <text x="207" y="190" text-anchor="middle" font-size="22" font-weight="700" fill="#991b1b">内容成本</text>
    <text x="207" y="222" text-anchor="middle" font-size="14" fill="#7f1d1d">剧本 / 视觉 / 视频 / 审核</text>
    <rect x="80" y="345" width="255" height="120" rx="18" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
    <text x="207" y="390" text-anchor="middle" font-size="22" font-weight="700" fill="#9a3412">交互成本</text>
    <text x="207" y="422" text-anchor="middle" font-size="14" fill="#7c2d12">ASR / LLM / TTS / CDN</text>
    <rect x="512" y="235" width="255" height="140" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="640" y="285" text-anchor="middle" font-size="23" font-weight="700" fill="#1e40af">单用户贡献</text>
    <text x="640" y="320" text-anchor="middle" font-size="14" fill="#1e3a8a">订阅 + 解锁 + 训练包</text>
    <text x="640" y="346" text-anchor="middle" font-size="14" fill="#1e3a8a">减去可变 AI 和分发成本</text>
    <rect x="945" y="145" width="255" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="1072" y="190" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">LTV</text>
    <text x="1072" y="222" text-anchor="middle" font-size="14" fill="#14532d">留存 / 复刷 / 订阅周期</text>
    <rect x="945" y="345" width="255" height="120" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="1072" y="390" text-anchor="middle" font-size="22" font-weight="700" fill="#5b21b6">回本逻辑</text>
    <text x="1072" y="422" text-anchor="middle" font-size="14" fill="#4c1d95">内容成本被多人、多次消费摊薄</text>
    <line x1="335" y1="205" x2="500" y2="275" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <line x1="335" y1="405" x2="500" y2="335" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <line x1="767" y1="285" x2="935" y2="205" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <line x1="767" y1="335" x2="935" y2="405" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <text x="640" y="585" text-anchor="middle" font-size="16" fill="#475569">要证明的不是“能不能生成视频”，而是单部内容能否通过完播、复刷、订阅和训练价值摊薄成本。</text>
  </g>
</svg>
