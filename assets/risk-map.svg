<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="700" viewBox="0 0 1280 700">
  <rect width="1280" height="700" fill="#0f172a"/>
  <text x="640" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#f8fafc">风险地图：真正要管理的是体验、成本和边界</text>
  <g font-family="Arial, sans-serif">
    <rect x="75" y="135" width="330" height="135" rx="18" fill="#7f1d1d"/><text x="240" y="178" text-anchor="middle" font-size="22" font-weight="700" fill="white">内容不好玩</text><text x="240" y="212" text-anchor="middle" font-size="14" fill="#fecaca">用户不会因为有学习价值而忍受无聊</text><text x="240" y="240" text-anchor="middle" font-size="14" fill="#fecaca">应对：先做一集强 Demo</text>
    <rect x="475" y="135" width="330" height="135" rx="18" fill="#92400e"/><text x="640" y="178" text-anchor="middle" font-size="22" font-weight="700" fill="white">用户不开口</text><text x="640" y="212" text-anchor="middle" font-size="14" fill="#fde68a">语音比点击更有心理门槛</text><text x="640" y="240" text-anchor="middle" font-size="14" fill="#fde68a">应对：选择先行 + 句式辅助</text>
    <rect x="875" y="135" width="330" height="135" rx="18" fill="#1e3a8a"/><text x="1040" y="178" text-anchor="middle" font-size="22" font-weight="700" fill="white">交互失控</text><text x="1040" y="212" text-anchor="middle" font-size="14" fill="#bfdbfe">自由聊天破坏剧情结构</text><text x="1040" y="240" text-anchor="middle" font-size="14" fill="#bfdbfe">应对：半开放状态机</text>
    <rect x="75" y="390" width="330" height="135" rx="18" fill="#065f46"/><text x="240" y="433" text-anchor="middle" font-size="22" font-weight="700" fill="white">AI 成本过高</text><text x="240" y="467" text-anchor="middle" font-size="14" fill="#a7f3d0">实时生成视频会拖垮毛利</text><text x="240" y="495" text-anchor="middle" font-size="14" fill="#a7f3d0">应对：离线视频 + 关键点 AI</text>
    <rect x="475" y="390" width="330" height="135" rx="18" fill="#4c1d95"/><text x="640" y="433" text-anchor="middle" font-size="22" font-weight="700" fill="white">大厂复制</text><text x="640" y="467" text-anchor="middle" font-size="14" fill="#ddd6fe">不能和平台比流量和产能</text><text x="640" y="495" text-anchor="middle" font-size="14" fill="#ddd6fe">应对：先做垂直学习场景</text>
    <rect x="875" y="390" width="330" height="135" rx="18" fill="#831843"/><text x="1040" y="433" text-anchor="middle" font-size="22" font-weight="700" fill="white">版权/肖像风险</text><text x="1040" y="467" text-anchor="middle" font-size="14" fill="#fbcfe8">AI 视频素材需可追溯</text><text x="1040" y="495" text-anchor="middle" font-size="14" fill="#fbcfe8">应对：原创角色和世界观</text>
  </g>
</svg>
