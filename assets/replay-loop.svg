<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720">
  <rect width="1120" height="720" fill="#f8fafc"/>
  <text x="560" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="31" font-weight="700" fill="#0f172a">复刷不是重复练习，而是重新进入故事</text>
  <defs><marker id="a" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M0,0 L14,7 L0,14 z" fill="#64748b"/></marker></defs>
  <g font-family="Arial, sans-serif">
    <circle cx="560" cy="360" r="90" fill="#7c3aed"/>
    <text x="560" y="350" text-anchor="middle" font-size="22" font-weight="700" fill="white">再玩一遍</text>
    <text x="560" y="380" text-anchor="middle" font-size="14" fill="#ede9fe">同一集，不同路线</text>
    <rect x="95" y="150" width="245" height="90" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="218" y="186" text-anchor="middle" font-size="19" font-weight="700" fill="#1e40af">隐藏线索</text>
    <text x="218" y="214" text-anchor="middle" font-size="14" fill="#1e3a8a">第一次错过，第二次寻找</text>
    <rect x="780" y="150" width="245" height="90" rx="18" fill="#ffedd5" stroke="#f97316" stroke-width="3"/>
    <text x="903" y="186" text-anchor="middle" font-size="19" font-weight="700" fill="#9a3412">不同选择</text>
    <text x="903" y="214" text-anchor="middle" font-size="14" fill="#7c2d12">换信任对象，换证据路径</text>
    <rect x="780" y="480" width="245" height="90" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="903" y="516" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">表达变好</text>
    <text x="903" y="544" text-anchor="middle" font-size="14" fill="#14532d">同一立场说得更清楚</text>
    <rect x="95" y="480" width="245" height="90" rx="18" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
    <text x="218" y="516" text-anchor="middle" font-size="19" font-weight="700" fill="#991b1b">成就收集</text>
    <text x="218" y="544" text-anchor="middle" font-size="14" fill="#7f1d1d">普通结局 + 隐藏结局</text>
    <path d="M340 195 C470 120 650 120 780 195" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <path d="M903 240 C1010 330 1010 430 903 480" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <path d="M780 525 C650 600 470 600 340 525" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
    <path d="M218 480 C110 420 110 300 218 240" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/>
  </g>
</svg>
