<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#0b1020"/>
  <text x="600" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#f8fafc">BabelTower 市场定位图</text>
  <text x="600" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#cbd5e1">强剧情娱乐 + 强 AI 交互 + 可评估学习收益</text>

  <line x1="180" y1="620" x2="1040" y2="620" stroke="#64748b" stroke-width="3"/>
  <line x1="180" y1="620" x2="180" y2="130" stroke="#64748b" stroke-width="3"/>
  <polygon points="1040,620 1022,610 1022,630" fill="#64748b"/>
  <polygon points="180,130 170,148 190,148" fill="#64748b"/>
  <text x="1040" y="654" text-anchor="end" font-family="Arial, sans-serif" font-size="18" fill="#e2e8f0">教育/能力收益强</text>
  <text x="120" y="140" text-anchor="middle" transform="rotate(-90 120 140)" font-family="Arial, sans-serif" font-size="18" fill="#e2e8f0">剧情/娱乐吸引力强</text>

  <line x1="610" y1="130" x2="610" y2="620" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="180" y1="375" x2="1040" y2="375" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

  <rect x="690" y="165" width="260" height="120" rx="18" fill="#7c3aed" opacity="0.95"/>
  <text x="820" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white">BabelTower</text>
  <text x="820" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ede9fe">Playable AI Dramas</text>
  <text x="820" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ede9fe">剧情驱动 + 语音/选择 + 复盘</text>

  <rect x="705" y="420" width="250" height="88" rx="14" fill="#0ea5e9" opacity="0.9"/>
  <text x="830" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">Speak / Duolingo</text>
  <text x="830" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e0f2fe">AI 口语/学习强，剧情弱</text>

  <rect x="360" y="430" width="210" height="78" rx="14" fill="#14b8a6" opacity="0.9"/>
  <text x="465" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">LOLA Speak</text>
  <text x="465" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ccfbf1">互动视频口语课</text>

  <rect x="320" y="195" width="230" height="88" rx="14" fill="#f97316" opacity="0.92"/>
  <text x="435" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">ReelShort / DramaBox</text>
  <text x="435" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffedd5">短剧强，用户仍是观众</text>

  <rect x="535" y="300" width="245" height="78" rx="14" fill="#f59e0b" opacity="0.92"/>
  <text x="658" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">Character.AI / StoryZone</text>
  <text x="658" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fef3c7">交互强，结构化学习弱</text>

  <rect x="790" y="320" width="230" height="78" rx="14" fill="#22c55e" opacity="0.9"/>
  <text x="905" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">Virti / Coursera</text>
  <text x="905" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dcfce7">模拟训练强，娱乐弱</text>

  <text x="210" y="705" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8">核心机会：不是再做教育 App，也不是再做 AI 短剧，而是把短剧变成可进入、可对话、可改变的学习体验。</text>
</svg>
